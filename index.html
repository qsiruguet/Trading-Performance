<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #f8f7f4; --surface: #ffffff; --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
  --text: #0e0e0e; --text-muted: #6b6b6b; --text-faint: #aaaaaa;
  --accent: #042C53; --accent-hover: #0C447C;
  --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
  --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
  --purple-bg: #EEEDFE; --purple-text: #534AB7;
  --amber-bg: #FAEEDA; --amber-text: #854F0B;
  --blue-bg: #E6F1FB; --blue-text: #185FA5;
  --radius: 10px; --radius-sm: 6px;
  --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-display); background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1080px; margin: 0 auto; padding: 2rem 1.5rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 40px; height: 40px; background: var(--accent); color: white; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; flex-shrink: 0; }
.site-title { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.2; }
.site-sub { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 2px; }
.db-status { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); transition: background 0.3s; }
.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--red); }
.nav { display: flex; gap: 4px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; }
.nav-btn { font-family: var(--font-display); font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.nav-btn:hover { background: var(--bg); color: var(--text); }
.nav-btn.active { background: var(--accent); color: white; }
.section { display: none; }
.section.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.metric-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.metric-value { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; }
.metric-value.pos { color: var(--green); }
.metric-value.neg { color: var(--red); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.chart-wrap { position: relative; width: 100%; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
.card-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.form-card { max-width: 720px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1 / -1; }
.form-divider { grid-column: 1 / -1; height: 0.5px; background: var(--border); margin: 6px 0; }
.form-section-label { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; padding-top: 2px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.tag { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 400; }
.tag-auto { background: var(--blue-bg); color: var(--blue-text); }
.tag-opt { background: var(--bg); color: var(--text-faint); border: 0.5px solid var(--border-strong); }
.field input, .field select, .field textarea { font-family: var(--font-display); font-size: 13px; padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); width: 100%; transition: border-color 0.15s, box-shadow 0.15s; }
.field input[readonly] { color: var(--text-muted); cursor: default; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(4,44,83,0.08); background: white; }
.field textarea { resize: vertical; min-height: 64px; }
.btn-primary { margin-top: 1.5rem; width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s, transform 0.1s, opacity 0.15s; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:active:not(:disabled) { transform: scale(0.99); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 820px; }
th { text-align: left; font-family: var(--font-mono); font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; padding: 0 10px 12px; white-space: nowrap; }
td { padding: 11px 10px; border-top: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
tr:hover td { background: var(--bg); }
.badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
.badge-long { background: var(--green-bg); color: var(--green-text); }
.badge-short { background: var(--red-bg); color: var(--red-text); }
.badge-crypto { background: var(--purple-bg); color: var(--purple-text); }
.badge-options { background: var(--amber-bg); color: var(--amber-text); }
.badge-indices { background: var(--blue-bg); color: var(--blue-text); }
.pnl-pos { color: var(--green); font-weight: 600; font-family: var(--font-mono); white-space: nowrap; }
.pnl-neg { color: var(--red); font-weight: 600; font-family: var(--font-mono); white-space: nowrap; }
.screen-link { font-family: var(--font-mono); font-size: 10px; color: var(--accent); text-decoration: none; padding: 3px 7px; background: var(--blue-bg); border-radius: 4px; white-space: nowrap; display: inline-block; transition: background 0.1s, color 0.1s; }
.screen-link:hover { background: var(--accent); color: white; }
.none-dash { color: var(--border-strong); font-family: var(--font-mono); font-size: 12px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 14px; padding: 3px 7px; border-radius: 4px; transition: background 0.1s, color 0.1s; }
.del-btn:hover { background: var(--red-bg); color: var(--red); }
.empty { text-align: center; padding: 3rem; color: var(--text-faint); font-family: var(--font-mono); font-size: 12px; }
.loading-overlay { position: fixed; inset: 0; background: rgba(248,247,244,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
.spinner { width: 30px; height: 30px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.55s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 500; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.err { background: var(--red); }
.tv-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.tv-toolbar select { font-family: var(--font-display); font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); cursor: pointer; }
.tv-toolbar select:focus { outline: none; border-color: var(--accent); }
.symbol-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.symbol-pill { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.symbol-pill:hover { border-color: var(--accent); color: var(--accent); }
.symbol-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
.tv-frame-wrap { border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); }
@media (max-width: 680px) {
  .metrics { grid-template-columns: 1fr 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-full { grid-column: 1; }
  .header { flex-direction: column; align-items: flex-start; }
}
  </style>
</head>
<body>
<div id="loading" class="loading-overlay"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>
<div class="app">
  <header class="header">
    <div class="header-left">
      <span class="logo">TJ</span>
      <div>
        <h1 class="site-title">Trading Journal</h1>
        <p class="site-sub">Options · Futures · Crypto · Indices</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">
      <div class="db-status">
        <span class="status-dot" id="db-dot"></span>
        <span id="db-label">Connexion...</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-section="dashboard">Tableau de bord</button>
        <button class="nav-btn" data-section="add">Nouveau trade</button>
        <button class="nav-btn" data-section="history">Historique</button>
      </nav>
    </div>
  </header>

  <section class="section active" id="sec-dashboard">
    <div class="metrics" id="metrics-row"></div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-label">P&amp;L cumule</div>
        <div class="chart-wrap" style="height:220px"><canvas id="chart-pnl"></canvas></div>
      </div>
      <div class="card">
        <div class="card-label">Repartition par actif</div>
        <div class="chart-wrap" style="height:220px"><canvas id="chart-asset"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-top:1rem">
      <div class="card-label">Gains / Pertes par trade</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-bar"></canvas></div>
    </div>
    <div class="card" style="margin-top:1rem">
      <div class="card-label">Graphique de prix - TradingView</div>
      <div class="tv-toolbar">
        <div class="symbol-pills" id="symbol-pills"></div>
        <select id="tv-interval" onchange="updateTVWidget()">
          <option value="1">1m</option><option value="5">5m</option><option value="15">15m</option>
          <option value="60" selected>1h</option><option value="240">4h</option>
          <option value="D">1j</option><option value="W">1s</option>
        </select>
        <select id="tv-theme" onchange="updateTVWidget()">
          <option value="light" selected>Clair</option><option value="dark">Sombre</option>
        </select>
      </div>
      <div class="tv-frame-wrap"><div id="tv-widget-container" style="height:460px"></div></div>
    </div>
  </section>

  <section class="section" id="sec-add">
    <div class="card form-card">
      <div class="card-label">Enregistrer un trade</div>
      <div class="form-grid">
        <div class="field"><label>Date</label><input type="date" id="f-date" /></div>
        <div class="field"><label>Heure</label><input type="time" id="f-time" /></div>
        <div class="field"><label>Symbole</label><input type="text" id="f-symbol" placeholder="BTC, NQ, SPX..." /></div>
        <div class="field"><label>Type d'actif</label>
          <select id="f-asset">
            <option value="Crypto">Crypto</option>
            <option value="Options">Options / Futures</option>
            <option value="Indices">Indices</option>
          </select>
        </div>
        <div class="field"><label>Direction</label>
          <select id="f-dir"><option value="Long">Long</option><option value="Short">Short</option></select>
        </div>
        <div class="field"><label>Quantite</label><input type="number" id="f-qty" placeholder="1" step="0.01" min="0" /></div>
        <div class="field"><label>Prix d'entree</label><input type="number" id="f-entry" placeholder="0.00" step="0.01" /></div>
        <div class="field"><label>Prix de sortie</label><input type="number" id="f-exit" placeholder="0.00" step="0.01" /></div>
        <div class="field"><label>P&amp;L ($) <span class="tag tag-auto">auto</span></label><input type="number" id="f-pnl" placeholder="Calcule automatiquement" readonly /></div>
        <div class="field"><label>R:R cible <span class="tag tag-opt">optionnel</span></label><input type="number" id="f-rr" placeholder="2.0" step="0.1" min="0" /></div>
        <div class="form-divider"></div>
        <div class="form-section-label">Analyse &amp; Screenshots</div>
        <div class="field form-full"><label>Strategie <span class="tag tag-opt">optionnel</span></label><input type="text" id="f-strategy" placeholder="Breakout, Retest, ICT, SMC, OB..." /></div>
        <div class="field"><label>Screenshot entree <span class="tag tag-opt">lien URL</span></label><input type="url" id="f-screen-entry" placeholder="https://..." /></div>
        <div class="field"><label>Screenshot sortie <span class="tag tag-opt">lien URL</span></label><input type="url" id="f-screen-exit" placeholder="https://..." /></div>
        <div class="field form-full"><label>Notes <span class="tag tag-opt">optionnel</span></label><textarea id="f-notes" placeholder="Contexte, emotions, observations..."></textarea></div>
      </div>
      <button class="btn-primary" id="btn-add">Enregistrer le trade</button>
    </div>
  </section>

  <section class="section" id="sec-history">
    <div class="card">
      <div class="card-label">Tous les trades</div>
      <div class="table-wrap" id="trade-table"></div>
    </div>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUPABASE_URL = 'https://eszmszeaetxykbxesjkj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UosQSe5as0gkvB9Bs2T9Zw_oLBMOW2Y';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let trades = [], charts = {}, tvSymbol = 'BINANCE:BTCUSDT';

function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
function toast(msg, isErr=false, dur=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show'+(isErr?' err':'');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}
function setDbStatus(ok) {
  document.getElementById('db-dot').className = 'status-dot '+(ok?'ok':'err');
  document.getElementById('db-label').textContent = ok ? 'Supabase connecte' : 'Erreur connexion';
}

async function fetchTrades() {
  const {data,error} = await db.from('trades').select('*').order('date',{ascending:false}).order('time',{ascending:false,nullsFirst:false});
  if (error) { console.error(error); setDbStatus(false); toast('Impossible de charger les trades', true); return []; }
  setDbStatus(true); return data||[];
}
async function insertTrade(trade) {
  const {data,error} = await db.from('trades').insert([trade]).select().single();
  if (error) { console.error(error); toast('Erreur lors de la sauvegarde', true); return null; }
  return data;
}
async function deleteTrade(id) {
  const {error} = await db.from('trades').delete().eq('id',id);
  if (error) { console.error(error); toast('Erreur suppression', true); return false; }
  return true;
}

async function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelector('[data-section="'+id+'"]').classList.add('active');
  if (id==='dashboard') { showLoading(true); trades=await fetchTrades(); showLoading(false); renderDashboard(); }
  if (id==='history')   { showLoading(true); trades=await fetchTrades(); showLoading(false); renderTable(); }
}

function renderMetrics() {
  const total = trades.reduce((s,t)=>s+(t.pnl||0),0);
  const wins=trades.filter(t=>(t.pnl||0)>0), losses=trades.filter(t=>(t.pnl||0)<0);
  const wr=trades.length?Math.round(wins.length/trades.length*100):0;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?losses.reduce((s,t)=>s+t.pnl,0)/losses.length:0;
  const rr=avgL!==0?(avgW/Math.abs(avgL)).toFixed(2):'--';
  const fmt=n=>(n>=0?'+':'-')+'$'+Math.abs(Math.round(n)).toLocaleString('fr-FR');
  document.getElementById('metrics-row').innerHTML=`
    <div class="metric"><div class="metric-label">P&L total</div><div class="metric-value ${total>=0?'pos':'neg'}">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Win rate</div><div class="metric-value">${wr}%</div></div>
    <div class="metric"><div class="metric-label">Trades</div><div class="metric-value">${trades.length}</div></div>
    <div class="metric"><div class="metric-label">Risk / Reward</div><div class="metric-value">${rr}</div></div>`;
}
function destroyChart(k) { if(charts[k]){charts[k].destroy();delete charts[k];} }
function renderDashboard() {
  renderMetrics(); renderSymbolPills(); updateTVWidget();
  const sorted=[...trades].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let cum=0;
  const cumData=sorted.map(t=>{cum+=(t.pnl||0);return Math.round(cum*100)/100;});
  const dateLabels=sorted.map(t=>t.date?t.date.slice(5):'');
  destroyChart('pnl');
  charts['pnl']=new Chart(document.getElementById('chart-pnl'),{type:'line',data:{labels:dateLabels,datasets:[{data:cumData,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.07)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#1D9E75',fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#aaa'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#aaa',callback:v=>'$'+v.toLocaleString('fr-FR')}}}}});
  const ag={};trades.forEach(t=>{const k=t.asset_type||'Autre';ag[k]=(ag[k]||0)+1;});
  const AC={Crypto:'#AFA9EC',Options:'#FAC775',Indices:'#85B7EB',Autre:'#B4B2A9'};
  destroyChart('asset');
  charts['asset']=new Chart(document.getElementById('chart-asset'),{type:'doughnut',data:{labels:Object.keys(ag),datasets:[{data:Object.values(ag),backgroundColor:Object.keys(ag).map(k=>AC[k]||'#B4B2A9'),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:14,usePointStyle:true,pointStyleWidth:8}}}}});
  destroyChart('bar');
  charts['bar']=new Chart(document.getElementById('chart-bar'),{type:'bar',data:{labels:sorted.map(t=>t.symbol),datasets:[{data:sorted.map(t=>t.pnl||0),backgroundColor:sorted.map(t=>(t.pnl||0)>=0?'rgba(29,158,117,0.7)':'rgba(226,75,74,0.65)'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#aaa'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#aaa',callback:v=>'$'+v}}}}});
}

function assetClass(a){return(a||'').toLowerCase().split('/')[0].trim().replace(/\s/g,'');}
function renderTable() {
  const wrap=document.getElementById('trade-table');
  if(!trades.length){wrap.innerHTML='<div class="empty">Aucun trade enregistre.<br>Utilise "Nouveau trade" ou ton bot Telegram.</div>';return;}
  const rows=trades.map(t=>{
    const pnl=t.pnl||0;
    const pnlStr=(pnl>=0?'+':'-')+'$'+Math.abs(pnl).toLocaleString('fr-FR');
    const eL=t.screenshot_entry?`<a href="${t.screenshot_entry}" target="_blank" rel="noopener" class="screen-link">Entree</a>`:'<span class="none-dash">-</span>';
    const sL=t.screenshot_exit?`<a href="${t.screenshot_exit}" target="_blank" rel="noopener" class="screen-link">Sortie</a>`:'<span class="none-dash">-</span>';
    const rr=t.rr_target?`<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">${t.rr_target}R</span>`:'<span class="none-dash">-</span>';
    const st=t.strategy?`<span style="font-size:11px;color:var(--text-muted);max-width:110px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.strategy}">${t.strategy}</span>`:'<span class="none-dash">-</span>';
    const ti=t.time?`<br><span style="color:#bbb;font-size:10px">${t.time.slice(0,5)}</span>`:'';
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:11px;color:#6b6b6b;white-space:nowrap">${t.date?t.date.slice(5):'-'}${ti}</td>
      <td style="font-weight:600">${t.symbol}</td>
      <td><span class="badge badge-${assetClass(t.asset_type)}">${t.asset_type||'-'}</span></td>
      <td><span class="badge badge-${(t.direction||'').toLowerCase()}">${t.direction||'-'}</span></td>
      <td style="font-family:var(--font-mono);font-size:12px">$${(+(t.entry_price||0)).toLocaleString('fr-FR')}</td>
      <td style="font-family:var(--font-mono);font-size:12px">$${(+(t.exit_price||0)).toLocaleString('fr-FR')}</td>
      <td class="${pnl>=0?'pnl-pos':'pnl-neg'}">${pnlStr}</td>
      <td>${rr}</td><td>${st}</td><td>${eL}</td><td>${sL}</td>
      <td><button class="del-btn" onclick="handleDelete(${t.id})">x</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML=`<table><thead><tr><th>Date</th><th>Symbole</th><th>Actif</th><th>Direction</th><th>Entree</th><th>Sortie</th><th>P&L</th><th>R:R</th><th>Strategie</th><th>Screen E</th><th>Screen S</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function autoCalcPnl(){
  const entry=parseFloat(document.getElementById('f-entry').value);
  const exit=parseFloat(document.getElementById('f-exit').value);
  const qty=parseFloat(document.getElementById('f-qty').value);
  const dir=document.getElementById('f-dir').value;
  const el=document.getElementById('f-pnl');
  if(!isNaN(entry)&&!isNaN(exit)&&!isNaN(qty)&&qty>0){
    const raw=dir==='Long'?(exit-entry)*qty:(entry-exit)*qty;
    el.value=(Math.round(raw*100)/100).toFixed(2);
  } else {el.value='';}
}

async function handleAddTrade(){
  const g=id=>document.getElementById(id).value.trim();
  const symbol=g('f-symbol').toUpperCase(),entry=parseFloat(g('f-entry')),exit=parseFloat(g('f-exit')),qty=parseFloat(g('f-qty')),dir=g('f-dir');
  if(!symbol||isNaN(entry)||isNaN(exit)||isNaN(qty)||qty<=0){toast('Symbole, entree, sortie et quantite requis',true);return;}
  let pnl=parseFloat(g('f-pnl'));
  if(isNaN(pnl)) pnl=Math.round((dir==='Long'?(exit-entry)*qty:(entry-exit)*qty)*100)/100;
  const trade={date:g('f-date')||new Date().toISOString().slice(0,10),time:g('f-time')||null,symbol,asset_type:g('f-asset'),direction:dir,entry_price:entry,exit_price:exit,quantity:qty,pnl,rr_target:parseFloat(g('f-rr'))||null,strategy:g('f-strategy')||null,notes:g('f-notes')||null,screenshot_entry:g('f-screen-entry')||null,screenshot_exit:g('f-screen-exit')||null};
  const btn=document.getElementById('btn-add');
  btn.disabled=true;btn.textContent='Enregistrement...';showLoading(true);
  const saved=await insertTrade(trade);
  showLoading(false);btn.disabled=false;btn.textContent='Enregistrer le trade';
  if(saved){
    ['f-symbol','f-entry','f-exit','f-qty','f-pnl','f-rr','f-strategy','f-notes','f-screen-entry','f-screen-exit','f-time'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
    toast('Trade '+symbol+' enregistre !');
    await showSection('dashboard');
  }
}

async function handleDelete(id){
  if(!confirm('Supprimer ce trade ?')) return;
  showLoading(true);
  const ok=await deleteTrade(id);
  if(ok){trades=trades.filter(t=>t.id!==id);renderTable();toast('Trade supprime');}
  showLoading(false);
}

const SYMBOL_MAP={BTC:'BINANCE:BTCUSDT',ETH:'BINANCE:ETHUSDT',SOL:'BINANCE:SOLUSDT',NQ:'CME_MINI:NQ1!',ES:'CME_MINI:ES1!',MNQ:'CME_MINI:MNQ1!',SPX:'SP:SPX',GOLD:'TVC:GOLD',DXY:'TVC:DXY',CL:'NYMEX:CL1!'};
function getUniqueSymbols(){const seen=new Set();return trades.map(t=>({label:t.symbol,tv:SYMBOL_MAP[t.symbol]||`BINANCE:${t.symbol}USDT`})).filter(s=>{if(seen.has(s.label))return false;seen.add(s.label);return true;});}
function renderSymbolPills(){const pills=document.getElementById('symbol-pills');if(!pills)return;const syms=getUniqueSymbols();if(!syms.length){pills.innerHTML='';return;}pills.innerHTML=syms.map((s,i)=>`<button class="symbol-pill${i===0?' active':''}" data-tv="${s.tv}" onclick="selectSymbol(this)">${s.label}</button>`).join('');tvSymbol=syms[0].tv;}
function selectSymbol(el){document.querySelectorAll('.symbol-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');tvSymbol=el.dataset.tv;updateTVWidget();}
function updateTVWidget(){
  const container=document.getElementById('tv-widget-container');if(!container)return;
  const interval=document.getElementById('tv-interval').value,theme=document.getElementById('tv-theme').value;
  container.innerHTML='';
  const script=document.createElement('script');script.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';script.async=true;
  script.innerHTML=JSON.stringify({autosize:true,symbol:tvSymbol,interval,timezone:'Europe/Paris',theme,style:'1',locale:'fr',allow_symbol_change:true,support_host:'https://www.tradingview.com',hide_side_toolbar:false,withdateranges:true,save_image:false});
  container.appendChild(script);
}

document.addEventListener('DOMContentLoaded', async()=>{
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>showSection(btn.dataset.section)));
  ['f-entry','f-exit','f-qty'].forEach(id=>document.getElementById(id).addEventListener('input',autoCalcPnl));
  document.getElementById('f-dir').addEventListener('change',autoCalcPnl);
  document.getElementById('btn-add').addEventListener('click',handleAddTrade);
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  showLoading(true);trades=await fetchTrades();showLoading(false);renderDashboard();
});
</script>
</body>
</html>
